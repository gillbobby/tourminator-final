# Local costmap parameters for local path planning
# FIXED: Flat structure for proper namespace loading

# Frame configuration - VERIFIED WITH WORKING SYSTEM
global_frame: odom                   # Local costmap uses odometry frame
robot_base_frame: base_link           # Robot base frame from TF

# Update rates - OPTIMIZED FOR REAL HARDWARE PERFORMANCE  
update_frequency: 5.0                 # Hz - how often to update local costmap
publish_frequency: 2.0                # Hz - how often to publish for visualization
transform_tolerance: 0.5
resolution: 0.025                        # Map resolution (5cm per pixel - good balance)


# Map dimensions - LOCAL MOVING WINDOW AROUND ROBOT
width: 4.0                            # meters - local costmap width
height: 4.0                           # meters - local costmap height  

# Map behavior - LOCAL COSTMAP SPECIFIC
static_map: false                     # Don't use static map for local planning
rolling_window: true                  # Move costmap with robot
track_unknown_space: false

plugins:
  - {name: static_layer,    type: "costmap_2d::StaticLayer"}
  - {name: obstacle_layer,  type: "costmap_2d::ObstacleLayer"}
  - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

obstacle_layer:
  enabled: true
  max_obstacle_height: 2.0              # Max height for obstacles (meters)
  #origin_z: 0.0                         # Z origin of robot base
  #z_resolution: 0.2                     # Z resolution for 3D obstacles
  #z_voxels: 10                          # Number of Z voxels
  unknown_threshold: 15                 # Unknown space threshold
  mark_threshold: 0                     # Threshold for marking obstacles
  combination_method: 1                 # How to combine observations (1 = maximum)
  obstacle_range: 8.0               # Max range to consider obstacles (conservative)
  raytrace_range: 10.0  
  
  observation_sources: laser_scan_sensor
# LiDAR sensor configuration - VERIFIED WITH WORKING HARDWARE
  laser_scan_sensor:
    sensor_frame: lidar_link              # Frame ID from verified TF setup
    data_type: LaserScan                  # Message type from lidar_bridge/RPLidar
    topic: /scan_filtered                           # Topic from working lidar_bridge.py
    marking: true                         # Use for adding obstacles to map
    clearing: true                        # Use for clearing obstacles from map
    min_obstacle_height: 0.0              # Minimum height to consider obstacle
    max_obstacle_height: 2.0              # Maximum height to consider obstacle
    obstacle_range: 6.0                   # Max range to add obstacles (conservative)
    raytrace_range: 8.0                   # Max range to clear space
    inf_is_valid: true                    # Treat infinite readings as max_range
    clearing_on_max_reading: true        # Clear on max range readings

static_layer:
  enabled: true
  map_topic: /map                       # Topic from SLAM (gmapping)
  first_map_only: false                 # Update when new map received
  subscribe_to_updates: true            # Listen for map updates
  lethal_cost_threshold: 75            # Threshold for lethal static obstacles
  unknown_cost_value: 255    

# Inflation layer configuration - CRITICAL FOR ROBOT SAFETY
inflation_layer:
  enabled: true
  cost_scaling_factor: 0.7            # How quickly cost decreases with distance
  inflation_radius: 0.30         #big radius for testing       # Distance to inflate obstacles (meters)
                 # Max range for clearing

footprint_clearing_enabled: true      # Clear obstacles within robot footprint
