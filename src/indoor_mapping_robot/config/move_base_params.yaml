global_frame: map
robot_base_frame: base_link

base_local_planner: dwa_local_planner/DWAPlannerROS
base_global_planner: global_planner/GlobalPlanner

#move_base will trigger recovery when:
#Global planner cannot find a plan for > planner_patience
#Local planner cannot generate a valid cmd_vel for > controller_patience
#The robot has moved less than oscillation_distance (0.3 m) for more than oscillation_timeout (8 s)

planner_frequency: 0.5
controller_frequency: 10.0

planner_patience: 8.0
controller_patience: 8.0

oscillation_timeout: 10.0 
oscillation_distance: 0.3

recovery_behavior_enabled: true
clearing_rotation_allowed: true
shutdown_costmaps: false

conservative_reset_dist: 0.4   # costmap clear radius (conservative)
clearing_radius: 0.4

# Optional: explicitly define recovery behaviors so they run in a sane order
recovery_behaviors:
 # - name: stepback_and_steerturn 
  #  type: stepback_and_steerturn_recovery/StepBackAndSteerTurnRecovery
  - name: conservative_clear
    type: clear_costmap_recovery/ClearCostmapRecovery
  - name: rotate_recovery
    type: rotate_recovery/RotateRecovery
  - name: aggressive_clear
    type: clear_costmap_recovery/ClearCostmapRecovery

conservative_clear:
  reset_distance: 0.4
  layer_names: ["obstacle_layer"]

rotate_recovery:
  sim_granularity: 0.017
  frequency: 20.0

aggressive_clear:
  reset_distance: 1.0
